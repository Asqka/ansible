
- name: Configure firewall (UFW)
  hosts: NGINX
  become: yes

  tasks:

    - name: Install UFW
      apt:
        name: ufw
        state: present
        update_cache: yes

    - name: Allow SSH
      command: ufw allow ssh

    - name: Allow HTTP (port 80)
      command: ufw allow 80

    - name: Enable firewall
      command: echo "y" | ufw enable
