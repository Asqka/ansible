
- name: Modify file using lineinfile
  hosts: NGINX
  become: yes

  tasks:

    - name: Create index.html file
      copy:
        dest: /var/www/html/index.html
        content: "Hello from Ansible\n"

    - name: Replace line in index.html
      lineinfile:
        path: /var/www/html/index.html
        line: "This file was modified by Ansible"
        create: yes
